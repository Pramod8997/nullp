# Mosquitto Configuration — Phase 2 Production
# ─────────────────────────────────────────────

# TCP listener on standard port
listener 1883

# Allow anonymous for dev; set to false + add password_file for production
allow_anonymous true

# Persistent message storage (survive broker restart)
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type all

# Connection limits
max_connections 50
max_queued_messages 1000

# Keepalive (detect dead clients faster)
max_keepalive 60
