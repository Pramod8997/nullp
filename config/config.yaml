app:
  name: "Digital Twin EMS"
  debug: true

mqtt:
  broker: "localhost"
  port: 1883
  qos_safety: 1
  qos_telemetry: 0
  topics:
    reads: "home/sensor/+/power"
    writes: "home/plug/+/command"
    events: "home/ui/events"

database:
  path: "data/ems_state.db"
  fallback_csv: "data/fallback_measurements.csv"
  retention_days: 30

# Phase 2: Explicit device configuration
devices:
  node_fridge:      { simulated: false, rated: 200,  tier0: true }
  node_microwave:   { simulated: false, rated: 1200, tier0: false }
  node_kettle:      { simulated: false, rated: 2500, tier0: false }
  node_hvac:        { simulated: false, rated: 2000, tier0: false }
  esp32_tv:         { simulated: true,  rated: 150,  tier0: false }
  esp32_washer:     { simulated: true,  rated: 1800, tier0: false }
  esp32_dryer:      { simulated: true,  rated: 2000, tier0: false }
  esp32_dishwasher: { simulated: true,  rated: 1500, tier0: false }
  esp32_oven:       { simulated: true,  rated: 3000, tier0: false }
  esp32_lighting:   { simulated: true,  rated: 100,  tier0: false }

# 10 appliance classes used by Phase-1 NILM pipeline
appliances:
  - fridge
  - hvac
  - kettle
  - tv
  - washing_machine
  - dishwasher
  - microwave
  - oven
  - ev_charger
  - laptop

system_safety:
  max_aggregate_wattage: 3500.0
  warning_pct: 1.10
  critical_pct: 1.25
  # Per-appliance watt limits; tier0: true = life-critical (never shed)
  fridge:          { max_w: 300,  tier0: false }
  hvac:            { max_w: 2500, tier0: false }
  kettle:          { max_w: 2500, tier0: false }
  tv:              { max_w: 300,  tier0: false }
  washing_machine: { max_w: 2200, tier0: false }
  dishwasher:      { max_w: 2200, tier0: false }
  microwave:       { max_w: 1500, tier0: false }
  oven:            { max_w: 2500, tier0: false }
  ev_charger:      { max_w: 3800, tier0: false }
  laptop:          { max_w: 150,  tier0: false }
  # medical_device, alarm_system → tier0: true (not sheddable — Phase 2)
  # Legacy per-device ID limits kept for ESP32 simulator compatibility
  device_wattage_limits:
    node_fridge: 200.0
    node_microwave: 1200.0
    node_kettle: 2500.0
    node_hvac: 2000.0
    esp32_tv: 150.0
    esp32_washer: 1800.0
    esp32_dryer: 2000.0
    esp32_dishwasher: 1500.0
    esp32_oven: 3000.0
    esp32_lighting: 100.0
    default: 1500.0

protonet:
  weights_path: "backend/models/weights/cnn_weights.pth"
  anchors_path: "backend/models/weights/protonet_anchors.pt"
  seq_len: 128
  embedding_size: 128
  distance_threshold: 15.0
  confidence_threshold: 0.90
  openmax_tail_size: 20
  openmax_alpha: 3

analytics:
  tou_pricing:
    peak:   { hours: [7,8,9,17,18,19,20,21], rate: 0.28 }
    mid:    { hours: [10,11,12,13,14,15,16], rate: 0.18 }
    off_peak: { hours: [0,1,2,3,4,5,6,22,23], rate: 0.09 }

rl:
  cooldown_seconds: 15.0
  empathy_pmv_min: -0.5
  empathy_pmv_max: 0.5
  q_table_path: "backend/models/weights/q_table.pkl"
  epsilon_start: 0.3
  epsilon_end: 0.01
  epsilon_decay: 0.999995
  promotion_episodes: 50

preprocessing:
  sg_window: 11
  sg_poly: 2
  transient_threshold_w: 50.0
  transient_window_s: 5

delta_stability:
  buffer_size: 10
  stability_threshold: 3.0
  min_occurrences: 3
